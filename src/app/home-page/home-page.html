<div class="home">
    <div class="intro">
        <div class="tag-line">
            <div class="heading">
                     <img src="assets/images/logo_1.png" alt="design">
            </div>
        </div>
        <div class="picture">
            <img src="assets/images/concrete_1.7.jpeg" alt="design" height="545" width="550">
        </div>
    </div>
    <div class="achievement">
        <div class="achievement-section">
            <div class="achieve-text">
                <div class="achieve-heading">
                    {{achievementData.heading}}
                </div>
                @for (point of achievementData.points; track $index) {
                <div class="achieve-content">
                    <mat-icon fontSet="material-symbols-outlined">check</mat-icon>
                    <span>{{ point }}</span>
                </div>
                }
            </div>

            <div class="achieve-image">
                <img src="assets/images/exterior_main.jpeg" alt="Demo" height="345" width="550">
            </div>
        </div>
    </div>

    <div class="services">
        <div class="serv-content">
            <app-services></app-services>
        </div>
    </div>
    <div class="practises">
        <div class="prac-heading">
            <span>We Follow Best Practices</span>
        </div>
        <div class="prac-content">
            @for(practise of practises; track $index){
            <div class="prac-item">
                <span>{{practise}}</span>
            </div>
            }
        </div>

    </div>
</div>
